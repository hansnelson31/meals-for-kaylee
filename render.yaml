# Tells Render what to build. With this file in the repo you can use
# New > Blueprint instead of wiring the service and database up by hand.

services:
  - type: web
    name: meals-for-kaylee
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: meals-db
          property: connectionString

databases:
  - name: meals-db
    plan: free
