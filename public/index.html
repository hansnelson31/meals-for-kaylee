<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meals for Kaylee &amp; Seth</title>
<meta name="description" content="Sign up to bring a meal to Kaylee, Seth, and their new baby Hanna.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,400;0,500;0,700;1,400&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script>
/* ============================================================
   EDIT THIS BLOCK — everything on the page comes from here.
   ============================================================ */
const CONFIG = {

  // --- The dates people can sign up for. Add or remove lines freely. ---
  // Format is YYYY-MM-DD. Mon/Wed/Fri, starting this Wednesday.
  dates: [
    "2026-07-22",
    "2026-07-24",
    "2026-07-27",
    "2026-07-29",
    "2026-07-31",
    "2026-08-03",
    "2026-08-05",
    "2026-08-07"
  ],

  // --- The announcement at the top ---
  eyebrow: "A meal calendar for Kaylee & Seth",
  headline: "Hanna is here.",
  announcement: "We thank the Lord for the safe delivery of Hanna to Kaylee and Seth. Both baby and mother are doing well, but to help Kaylee recover, we\u2019re asking for meals for them for the next two weeks.",

  // --- Practical details ---
  household: "Seth, Kaylee, and their three older kids, plus baby Hanna. Plan on feeding five.",
  dietary: "Gluten free and dairy free. The whole meal doesn\u2019t have to be \u2014 just make sure a few things on the plate are free of gluten and dairy so Kaylee can eat too.",
  dropOff: "Anytime between 5:30 and 6:30 PM. Porch drop-off is perfect \u2014 no need to knock or stay.",
  address: "7776 HWY 14, Fort Collins, CO",
  contacts: [
    { name: "Seth", phone: "970-381-9313" },
    { name: "Kaylee", phone: "970-800-1660" }
  ],
  extraNote: "Please label anything that is gluten free or dairy free. Disposable dishes are a real kindness \u2014 nobody has to remember to return them.",

  // --- Saving sign-ups ---
  // Leave this blank. The server that hosts this page also stores the
  // sign-ups, so the page just talks to itself. You would only fill this
  // in if you moved the page somewhere separate from the server.
  apiBase: ""
};
</script>

</head>

<body>
<div class="wrap">

  <header class="masthead">
    <p class="eyebrow" id="eyebrow"></p>
    <h1 class="headline" id="headline"></h1>
    <p class="announcement" id="announcement"></p>
    <div class="ledger" id="ledger" aria-live="polite"></div>
  </header>

  <section class="details">
    <h2>What to know before you cook</h2>
    <dl>
      <div class="detail-row"><dt>Who</dt><dd id="d-household"></dd></div>
      <div class="detail-row"><dt>Food</dt><dd id="d-dietary"></dd></div>
      <div class="detail-row"><dt>When</dt><dd id="d-dropoff"></dd></div>
      <div class="detail-row"><dt>Where</dt><dd id="d-address"></dd></div>
      <div class="detail-row"><dt>Questions</dt><dd id="d-contact"></dd></div>
    </dl>
    <p class="details-note" id="d-extra"></p>
  </section>

  <h2 class="section-label">Pick a night</h2>
  <p class="section-sub">Scroll down to see what others are already bringing, so we don&rsquo;t send three lasagnas.</p>

  <div class="status" id="status"></div>
  <div id="board"><p class="loading">Loading the calendar&hellip;</p></div>

  <div class="footer">
    <button class="btn-ghost" id="copyBtn" type="button">Copy the list</button>
    <p id="footNote"></p>
  </div>

</div>

<script>
/* ===================== storage ===================== */

const STORE_KEY = "meal-signups-v1";

const store = {
  mode: "none",

  detect(){
    if (typeof window !== "undefined" && window.storage && typeof window.storage.get === "function") {
      this.mode = "artifact";   // running inside Claude
    } else {
      this.mode = "api";        // running on the server
    }
    return this.mode;
  },

  async load(){
    if (this.mode === "artifact") {
      try {
        const res = await window.storage.get(STORE_KEY, true);
        return res && res.value ? JSON.parse(res.value) : {};
      } catch (e) {
        return {}; // nothing saved yet
      }
    }
    const res = await fetch(CONFIG.apiBase + "/api/signups", { cache: "no-store" });
    if (!res.ok) throw new Error("Could not reach the sign-up list.");
    return await res.json();
  },

  /** Returns null if the night is now yours, or the existing entry if someone beat you to it. */
  async claim(iso, entry){
    if (this.mode === "artifact") {
      const all = await this.load();
      if (all[iso]) return all[iso];
      all[iso] = entry;
      const ok = await window.storage.set(STORE_KEY, JSON.stringify(all), true);
      if (!ok) throw new Error("That did not save.");
      return null;
    }
    const res = await fetch(CONFIG.apiBase + "/api/signups/" + iso, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(entry)
    });
    if (res.status === 409) {
      const body = await res.json();
      return body.entry;
    }
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.error || "That did not save.");
    }
    return null;
  },

  async release(iso){
    if (this.mode === "artifact") {
      const all = await this.load();
      delete all[iso];
      const ok = await window.storage.set(STORE_KEY, JSON.stringify(all), true);
      if (!ok) throw new Error("That did not save.");
      return;
    }
    const res = await fetch(CONFIG.apiBase + "/api/signups/" + iso, { method: "DELETE" });
    if (!res.ok) throw new Error("That did not save.");
  }
};

/* ===================== helpers ===================== */

const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function parseDate(iso){
  const p = iso.split("-").map(Number);
  return new Date(p[0], p[1] - 1, p[2]);
}
function dayName(iso){ return DAYS[parseDate(iso).getDay()]; }
function prettyDate(iso){
  const d = parseDate(iso);
  return MONTHS[d.getMonth()] + " " + d.getDate();
}
function esc(s){
  return String(s).replace(/[&<>"']/g, c => (
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
  ));
}

let signups = {};
let openForm = null;

/* ===================== render ===================== */

function fillStaticCopy(){
  document.getElementById("eyebrow").textContent = CONFIG.eyebrow;
  document.getElementById("headline").textContent = CONFIG.headline;
  document.getElementById("announcement").textContent = CONFIG.announcement;
  document.getElementById("d-household").textContent = CONFIG.household;
  document.getElementById("d-dietary").textContent = CONFIG.dietary;
  document.getElementById("d-dropoff").textContent = CONFIG.dropOff;
  document.getElementById("d-address").textContent = CONFIG.address;
  document.getElementById("d-extra").textContent = CONFIG.extraNote;
  document.getElementById("d-contact").innerHTML = CONFIG.contacts.map(c =>
    esc(c.name) + " &middot; <a href=\"tel:" + esc(c.phone.replace(/[^0-9+]/g, "")) + "\">" +
    esc(c.phone) + "</a>"
  ).join(" or ");
  const names = CONFIG.contacts.map(c => c.name).join(" or ");
  document.getElementById("footNote").textContent =
    "Signed up and something came up? Call " + names + " so the night doesn\u2019t go uncovered.";
}

function renderLedger(){
  const total = CONFIG.dates.length;
  const taken = CONFIG.dates.filter(d => signups[d]).length;
  const open = total - taken;
  document.getElementById("ledger").innerHTML =
    "<span><strong>" + total + "</strong> meals needed</span>" +
    "<span class=\"dot\">&mdash;</span>" +
    "<span class=\"done\"><strong>" + taken + "</strong> covered</span>" +
    "<span class=\"dot\">&mdash;</span>" +
    "<span><strong>" + open + "</strong> still open</span>";
}

function renderBoard(){
  const board = document.getElementById("board");
  const allTaken = CONFIG.dates.every(d => signups[d]);

  let html = "";
  if (allTaken) {
    html += "<div class=\"all-full\"><p>Every night is covered. Thank you \u2014 this is exactly what it looks like when a church shows up.</p></div>";
  }

  html += "<ul class=\"slots\">";
  CONFIG.dates.forEach(iso => {
    const s = signups[iso];
    html += "<li class=\"slot" + (s ? " is-taken" : "") + "\" data-date=\"" + iso + "\">";
    html += "<div class=\"slot-head\"><span class=\"slot-day\">" + dayName(iso) +
            "</span><span class=\"slot-date\">" + prettyDate(iso) + "</span></div>";

    if (s) {
      html += "<div class=\"sigline signed\"><span class=\"sig-name\">" + esc(s.name) + "</span></div>";
      html += "<p class=\"sig-meal\"><b>Bringing:</b> " + esc(s.meal) + "</p>";
      if (s.note) html += "<p class=\"sig-note\">" + esc(s.note) + "</p>";
      html += "<button class=\"btn-quiet\" data-release=\"" + iso + "\" type=\"button\">Cancel this sign-up</button>";
    } else {
      html += "<div class=\"sigline\"><span class=\"sig-rule\"></span>" +
              "<button class=\"btn\" data-claim=\"" + iso + "\" type=\"button\">Sign up</button></div>";
    }
    html += "</li>";
  });
  html += "</ul>";

  board.innerHTML = html;
  renderLedger();

  board.querySelectorAll("[data-claim]").forEach(b =>
    b.addEventListener("click", () => showForm(b.getAttribute("data-claim"))));
  board.querySelectorAll("[data-release]").forEach(b =>
    b.addEventListener("click", () => release(b.getAttribute("data-release"))));
}

function showForm(iso){
  if (openForm) renderBoard();
  openForm = iso;
  const slot = document.querySelector('.slot[data-date="' + iso + '"]');
  const form = document.createElement("div");
  form.className = "form";
  form.innerHTML =
    "<p class=\"form-error\" id=\"err\"></p>" +
    "<div class=\"field\"><label for=\"f-name\">Your name</label>" +
      "<input id=\"f-name\" type=\"text\" autocomplete=\"name\"></div>" +
    "<div class=\"field\"><label for=\"f-contact\">Phone or email</label>" +
      "<p class=\"field-hint\">Only Seth and Kaylee can see this — it’s so they can reach you if plans change.</p>" +
      "<input id=\"f-contact\" type=\"text\" autocomplete=\"tel\"></div>" +
    "<div class=\"field\"><label for=\"f-meal\">What you&rsquo;re bringing</label>" +
      "<input id=\"f-meal\" type=\"text\" placeholder=\"Roast chicken, rice, green beans, fruit\"></div>" +
    "<div class=\"field\"><label for=\"f-note\">Anything else (optional)</label>" +
      "<textarea id=\"f-note\" placeholder=\"Which parts are gluten free and dairy free? Any timing notes?\"></textarea></div>" +
    "<div class=\"form-actions\"><button class=\"btn\" id=\"f-save\" type=\"button\">Sign up for " +
      dayName(iso) + "</button>" +
      "<button class=\"btn-quiet\" id=\"f-cancel\" type=\"button\">Never mind</button></div>";
  slot.appendChild(form);
  document.getElementById("f-name").focus();

  document.getElementById("f-cancel").addEventListener("click", () => { openForm = null; renderBoard(); });
  document.getElementById("f-save").addEventListener("click", () => submit(iso));
}

async function submit(iso){
  const name = document.getElementById("f-name").value.trim();
  const contact = document.getElementById("f-contact").value.trim();
  const meal = document.getElementById("f-meal").value.trim();
  const note = document.getElementById("f-note").value.trim();
  const err = document.getElementById("err");

  if (!name || !contact || !meal) {
    err.textContent = "Add your name, a phone or email, and what you plan to bring.";
    err.classList.add("is-on");
    return;
  }

  const btn = document.getElementById("f-save");
  btn.disabled = true;
  btn.textContent = "Saving\u2026";

  try {
    // The server refuses a second sign-up for the same night, so two people
    // hitting the button at once can't overwrite each other.
    const taken = await store.claim(iso, { name, contact, meal, note });
    signups = await store.load();
    openForm = null;
    renderBoard();
    if (taken) {
      say(taken.name + " claimed that night a moment before you did. Pick another one \u2014 there are still meals to cover.");
    } else {
      hideSay();
    }
  } catch (e) {
    err.textContent = e.message + " Check your connection and try again.";
    err.classList.add("is-on");
    btn.disabled = false;
    btn.textContent = "Sign up for " + dayName(iso);
  }
}

async function release(iso){
  const s = signups[iso];
  if (!s) return;
  if (!confirm("Cancel " + s.name + "\u2019s sign-up for " + dayName(iso) + ", " + prettyDate(iso) + "?")) return;
  try {
    await store.release(iso);
    signups = await store.load();
    renderBoard();
    hideSay();
  } catch (e) {
    say("That did not save. " + e.message);
  }
}

function say(msg){
  const el = document.getElementById("status");
  el.textContent = msg;
  el.classList.add("is-on");
}
function hideSay(){ document.getElementById("status").classList.remove("is-on"); }

document.getElementById("copyBtn").addEventListener("click", () => {
  let out = CONFIG.headline + "\n" + CONFIG.eyebrow + "\n\n";
  CONFIG.dates.forEach(iso => {
    const s = signups[iso];
    out += dayName(iso) + ", " + prettyDate(iso) + " \u2014 " +
      (s ? s.name + ": " + s.meal : "OPEN") + "\n";
  });
  navigator.clipboard.writeText(out).then(
    () => say("Copied. Paste it into a text or an email."),
    () => say("Copying is blocked in this browser. Select the list and copy it by hand.")
  );
});

/* ===================== boot ===================== */

(async function init(){
  fillStaticCopy();
  store.detect();
  try {
    signups = await store.load();
  } catch (e) {
    signups = {};
    say("Could not load the sign-ups. " + e.message + " Refresh the page in a moment.");
  }
  renderBoard();
})();
</script>
</body>
</html>
